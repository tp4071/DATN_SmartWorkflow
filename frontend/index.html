<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Workflow</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff", "tertiary-50": "#FFF7ED", "success-600": "#15803D",
              "secondary-300": "#B79AF7", "on-secondary": "#ffffff", "surface-container": "#eeedf5",
              "success-50": "#F0FDF4", "tertiary-fixed": "#ffdbcb", "neutral-900": "#18181B",
              "surface-container-high": "#e9e7ef", "primary-fixed": "#dce1ff",
              "on-tertiary-fixed-variant": "#773205", "inverse-primary": "#b6c4ff",
              "surface": "#faf8ff", "primary": "#00236f", "surface-tint": "#4059aa",
              "outline": "#757682", "on-error-container": "#93000a", "tertiary-700": "#572300",
              "on-secondary-fixed": "#25005a", "background": "#faf8ff", "primary-700": "#172E73",
              "neutral-100": "#F1F1F3", "secondary-50": "#F5F0FF", "surface-container-lowest": "#ffffff",
              "danger-500": "#DC2626", "primary-fixed-dim": "#b6c4ff", "on-surface": "#1a1b21",
              "primary-100": "#DBEAFE", "secondary-fixed": "#eaddff", "error-container": "#ffdad6",
              "on-secondary-container": "#fffbff", "secondary-container": "#8a4cfc",
              "inverse-surface": "#2f3036", "danger-50": "#FEF2F2", "neutral-25": "#FCFCFD",
              "on-surface-variant": "#444651", "neutral-200": "#E5E5E8", "surface-variant": "#e3e1e9",
              "tertiary-fixed-dim": "#ffb691", "tertiary-900": "#3B1700",
              "surface-container-highest": "#e3e1e9", "secondary-100": "#EDE4FF",
              "on-primary-fixed-variant": "#264191", "on-tertiary-container": "#f39461",
              "secondary": "#712ae2", "on-primary-container": "#90a8ff", "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#5a00c6", "outline-variant": "#c5c5d3",
              "primary-900": "#10235F", "secondary-900": "#4C1D95", "on-background": "#1a1b21",
              "on-tertiary": "#ffffff", "on-primary-fixed": "#00164e", "neutral-50": "#F7F7F8",
              "tertiary": "#4b1c00", "neutral-300": "#D0D0D5", "tertiary-300": "#FDBA74",
              "neutral-700": "#3D3D43", "on-tertiary-fixed": "#341100", "error": "#ba1a1a",
              "tertiary-container": "#6e2c00", "secondary-fixed-dim": "#d2bbff",
              "inverse-on-surface": "#f1f0f8", "primary-300": "#93B4F5",
              "primary-container": "#1e3a8a", "secondary-700": "#6D28D9",
              "surface-bright": "#faf8ff", "surface-container-low": "#f4f3fb",
              "primary-50": "#EFF6FF", "tertiary-100": "#FFEDD5", "surface-dim": "#dad9e1"
            },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
            spacing: {
              "stack-gap": "16px", "header-height": "64px", "sidebar-width": "220px",
              "container-padding": "24px", "footer-height": "40px",
              "inline-gap": "12px", "table-row-height": "52px"
            },
            fontFamily: {
              body: ["Inter", "sans-serif"], "body-semibold": ["Inter", "sans-serif"],
              h1: ["Inter", "sans-serif"], h2: ["Inter", "sans-serif"], h3: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"], caption: ["Inter", "sans-serif"]
            },
            fontSize: {
              h1: ["24px", { lineHeight: "32px", fontWeight: "700" }],
              h2: ["20px", { lineHeight: "28px", fontWeight: "600" }],
              h3: ["16px", { lineHeight: "24px", fontWeight: "600" }],
              body: ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "body-semibold": ["14px", { lineHeight: "20px", fontWeight: "500" }],
              label: ["12px", { lineHeight: "16px", fontWeight: "600" }],
              caption: ["11px", { lineHeight: "14px", fontWeight: "400" }]
            }
          }
        }
      };
    </script>
  </head>
  <body class="antialiased min-h-screen flex flex-col text-on-surface">
    <div id="root"></div>
    <div id="modal-root"></div>
    <div id="toast-root" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-2 pointer-events-none"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
